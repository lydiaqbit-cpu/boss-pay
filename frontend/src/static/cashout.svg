<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- 钱袋身体 -->
  <ellipse cx="24" cy="31" rx="16" ry="14" fill="#F5D06A" stroke="#C9A020" stroke-width="1.2"/>
  <!-- 钱袋高光 -->
  <ellipse cx="19" cy="24" rx="4" ry="3" fill="white" opacity="0.2" transform="rotate(-20 19 24)"/>
  <!-- 袋口收口 -->
  <path d="M17 17 Q20 14 24 13 Q28 14 31 17" stroke="#C9A020" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 袋口绳结 -->
  <circle cx="24" cy="12" r="3.5" fill="#E8903A" stroke="#C07020" stroke-width="0.8"/>
  <path d="M21.5 10.5 Q24 8 26.5 10.5" stroke="#C07020" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- 眼睛 左 - 挤眼 -->
  <path d="M18 28 Q20 26.5 22 28" stroke="#7A4E10" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 眼睛 右 - 星星眼 -->
  <text x="25" y="30" font-size="7" text-anchor="middle" fill="#7A4E10">★</text>
  <!-- 嘴 得意笑 -->
  <path d="M19 34 Q24 38 29 34" stroke="#7A4E10" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="17" cy="33" rx="2.5" ry="1.5" fill="#F4A0A0" opacity="0.5"/>
  <ellipse cx="31" cy="33" rx="2.5" ry="1.5" fill="#F4A0A0" opacity="0.5"/>
  <!-- 飞出的硬币 右上 -->
  <circle cx="37" cy="12" r="4.5" fill="#FFD85C" stroke="#C9A020" stroke-width="0.8"/>
  <text x="37" y="15" font-size="5.5" text-anchor="middle" fill="#A07010" font-weight="bold">¥</text>
  <!-- 飞出的硬币 左上 -->
  <circle cx="10" cy="10" r="3.5" fill="#FFD85C" stroke="#C9A020" stroke-width="0.8"/>
  <text x="10" y="13" font-size="4.5" text-anchor="middle" fill="#A07010" font-weight="bold">¥</text>
  <!-- 运动线 -->
  <path d="M33 17 L36 13" stroke="#C9A020" stroke-width="1" stroke-dasharray="1.5 1.5" opacity="0.6"/>
  <path d="M14 15 L11 11" stroke="#C9A020" stroke-width="1" stroke-dasharray="1.5 1.5" opacity="0.6"/>
</svg>
